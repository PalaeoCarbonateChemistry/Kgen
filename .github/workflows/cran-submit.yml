name: 'Submit R package to CRAN'

on:
  push:
    branches: [main]
    paths: ['r/DESCRIPTION']

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version_bumped: ${{ steps.compare.outputs.bumped }}
      local_version: ${{ steps.compare.outputs.local }}
      cran_version: ${{ steps.compare.outputs.cran }}
    steps:
      - uses: actions/checkout@v4

      - name: Compare version against CRAN
        id: compare
        run: |
          LOCAL_VERSION=$(grep '^Version:' r/DESCRIPTION | sed 's/Version: *//')
          echo "local=$LOCAL_VERSION" >> "$GITHUB_OUTPUT"

          # Fetch current CRAN version (returns empty if not on CRAN)
          CRAN_VERSION=$(curl -s "https://cran.r-project.org/web/packages/kgen/DESCRIPTION" \
            | grep '^Version:' | sed 's/Version: *//' || echo "")

          if [ -z "$CRAN_VERSION" ]; then
            echo "Package not yet on CRAN — treating as new submission"
            echo "cran=none" >> "$GITHUB_OUTPUT"
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          elif [ "$LOCAL_VERSION" = "$CRAN_VERSION" ]; then
            echo "Version $LOCAL_VERSION matches CRAN — skipping"
            echo "cran=$CRAN_VERSION" >> "$GITHUB_OUTPUT"
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version bump detected: CRAN=$CRAN_VERSION → local=$LOCAL_VERSION"
            echo "cran=$CRAN_VERSION" >> "$GITHUB_OUTPUT"
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          fi

  r-cmd-check:
    needs: check-version
    if: needs.check-version.outputs.version_bumped == 'true'
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest, r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest, r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev curl

      - name: Install R dependencies
        run: |
          install.packages(c("remotes", "rcmdcheck"))
          remotes::install_deps(pkgdir = "r/", dependencies = TRUE, upgrade = "never")
        shell: Rscript {0}

      - name: R CMD check (as CRAN)
        run: |
          rcmdcheck::rcmdcheck(
            path = "r/",
            args = c("--as-cran", "--run-donttest"),
            error_on = "warning"
          )
        shell: Rscript {0}

  submit-cran:
    needs: [check-version, r-cmd-check]
    if: needs.check-version.outputs.version_bumped == 'true'
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Install dependencies
        run: |
          install.packages(c("remotes", "devtools"))
          remotes::install_deps(pkgdir = "r/", dependencies = TRUE, upgrade = "never")
        shell: Rscript {0}

      - name: Submit to CRAN
        env:
          DEVTOOLS_SUBMIT_CRAN_YES: 'true'
        run: |
          devtools::submit_cran(pkg = "r/")
          message("Submitted to CRAN — check maintainer email for confirmation link")
        shell: Rscript {0}
